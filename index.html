<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planwise</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Immediate loading state — visible before any JS runs -->
  <div id="app">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:system-ui,sans-serif;color:#6B6966;">
      <div style="font-size:2rem;">🌱</div>
      <div style="font-size:0.9rem;">Loading Planwise…</div>
      <div id="load-error" style="display:none;max-width:400px;text-align:center;padding:1rem;background:#FCEBEB;border-radius:10px;color:#A32D2D;font-size:0.85rem;line-height:1.6;margin-top:8px;"></div>
    </div>
  </div>
  <div id="toast-container"></div>

  <script>
    // Catch errors before modules load
    window.addEventListener('error', function(e) {
      const errEl = document.getElementById('load-error');
      if (errEl) {
        errEl.style.display = 'block';
        errEl.innerHTML = '<strong>Something went wrong loading the app.</strong><br>' +
          (e.message || 'Unknown error') + '<br><br>' +
          '<em>If you opened this as a file:// URL, you need to serve it with a local server. See README.md.</em>';
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      const errEl = document.getElementById('load-error');
      if (errEl) {
        errEl.style.display = 'block';
        const msg = e.reason?.message || String(e.reason) || 'Unknown error';
        errEl.innerHTML = '<strong>App failed to start.</strong><br>' + msg +
          '<br><br><em>Check your Firebase config in js/firebase.js — placeholder values will cause this.</em>';
      }
    });
  </script>

<div id="app">
    </div>
  <div id="toast-container"></div>

  <script type="module" src="js/firebase.js"></script>
  <script type="module" src="js/app.js"></script>
  
</body>
</html>
